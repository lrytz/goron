# docker compose build && docker compose run --rm claude
# -> claude --dangerously-skip-permissions
# -> shift+enter doesn't work, type `\` at the end of the line to insert a line break
services:
  claude:
    build: .
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
    volumes:
      - .:/project
      - home:/home/node

volumes:
  home:
